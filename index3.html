.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);

    padding: 20px;
    flex: 1;
}
.image-box {
    border: 2px solid black;
    height: 150px;

    display: flex;
    justify-content: center;
    align-items: center;
}

.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

footer {
    color: white;
    background: black;
    padding: 20px;
    margin-top: 40px;
}

</style>
</head>
